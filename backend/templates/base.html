<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Email AI{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* RESET */
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        min-height: 100vh;

        /* CENTRALIZAÇÃO */
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        max-width: 700px;
        width: 100%;
      }

      h1, h2 {
        margin-bottom: 20px;
        text-align: center;
      }

      form {
        display: flex;
        flex-direction: column;
      }

      input, textarea, button {
        margin: 8px 0;
        padding: 12px;
        border-radius: 10px;
        border: none;
        font-size: 1rem;
      }

      input, textarea {
        background: #1e293b;
        color: #f1f5f9;
      }

      input::placeholder, textarea::placeholder {
        color: #94a3b8;
      }

      button {
        background: #38bdf8;
        color: #0f172a;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      button:hover {
        background: #0ea5e9;
      }

      .result {
        border-radius: 12px;
        padding: 15px;
        margin-top: 20px;
        font-weight: 500;
      }

      .produtivo {
        background: #22c55e33;
        border-left: 5px solid #22c55e;
      }

      .improdutivo {
        background: #f0c3585f;
        border-left: 5px solid #e9b441;
      }

      .error {
        background: #f8717133;
        border-left: 5px solid #ee3838;
      }

      .card {
        background: #1e293b;
        padding: 25px;
        border-radius: 16px;
        margin-bottom: 30px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      }

      a {
        color: #38bdf8;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .logout {
        text-align: right;
        margin-bottom: 15px;
      }

      /* ESTILO DA SIDEBAR FIXA */
      .sidebar {
        position: fixed;
        right: 20px;
        top: 20px;
        width: 350px;
        bottom: 20px;
        background: #1e293b;
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        box-shadow: -5px 0 20px rgba(0,0,0,0.3);
        z-index: 100;
      }

      .history-list {
        overflow-y: auto;
        flex: 1;
        margin-top: 15px;
      }

      .history-item {
        background: #0f172a;
        padding: 12px;
        border-radius: 10px;
        margin-bottom: 12px;
        border: 1px solid #334155;
        font-size: 0.85rem;
      }

      /* Scrollbar discreta para a sidebar */
      .history-list::-webkit-scrollbar { width: 4px; }
      .history-list::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 10px; }

      /* Esconder sidebar em telas muito pequenas para não sobrepor o card */
      @media (max-width: 1100px) {
        .sidebar { display: none; }
      }

      @media (max-width: 500px) {
        body { padding: 20px 10px; }
        .card { padding: 15px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
